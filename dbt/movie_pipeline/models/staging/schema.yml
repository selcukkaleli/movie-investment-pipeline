version: 2

models:
  - name: stg_ratings_with_genres
    description: "Cleaned and renamed ratings data with exploded genres. Grain: one row per user-movie-genre event."
    columns:
      - name: movie_id
        description: "Unique movie identifier"
        tests:
          - not_null

      - name: user_id
        description: "Unique user identifier"
        tests:
          - not_null

      - name: rating
        description: "User rating between 0.5 and 5.0"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
                quote: false

      - name: genre
        description: "Single genre per row (exploded from pipe-separated string)"
        tests:
          - not_null

      - name: rated_at
        description: "Timestamp when the rating was given"
        tests:
          - not_null